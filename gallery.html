        .section-title { margin:0; font-size:clamp(2.2rem, 4.8vw, 3rem); font-weight:800; letter-spacing:-0.03em; line-height:1.15; position:relative; display:inline-block; padding-bottom:20px; }
        .section-title::after { content:""; position:absolute; left:50%; transform:translateX(-50%); bottom:0; width:62px; height:4px; border-radius:999px; background:var(--primary); }
        .section-subtitle { margin:18px 0 0; font-size:1.05rem; color:var(--muted); font-weight:500; }
        .gallery-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:32px; }
        .gallery-item { background:rgba(255,255,255,0.8); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; transition:transform .2s ease, box-shadow .2s ease; border-top:4px solid #2448f2; }
        .gallery-item:hover { transform:translateY(-4px); box-shadow:0 14px 30px rgba(15, 23, 42, 0.10), 0 4px 8px rgba(15,23,42,0.06); }
        .gallery-item-wide { grid-column: span 2; }
        .gallery-image-wrapper, .gallery-image-wrapper-wide { background:#e5e7eb; }
        .gallery-image {
            display:block;
            width:100%;

        .image-fallback {

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const navToggle = document.querySelector('.nav-toggle');
            const navMenu = document.querySelector('.nav-menu');
            const navLinks = document.querySelectorAll('.nav-link');
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const isOpen = navMenu.classList.toggle('nav-menu--open');
                    navToggle.setAttribute('aria-expanded', String(isOpen));
                });
                navLinks.forEach(link => link.addEventListener('click', () => {
                    navMenu.classList.remove('nav-menu--open');
                    navToggle.setAttribute('aria-expanded', 'false');
                }));
                document.addEventListener('click', function(e) {
                    if (!navToggle.contains(e.target) && !navMenu.contains(e.target)) {
                        navMenu.classList.remove('nav-menu--open');
                        navToggle.setAttribute('aria-expanded', 'false');
                    }
                });
            }

            const buildSources = (fileId, size) => [
                `https://drive.google.com/thumbnail?id=${fileId}&sz=${size}`,
                `https://drive.google.com/uc?export=view&id=${fileId}`,
                `https://lh3.googleusercontent.com/d/${fileId}=${size}`
            ];

            document.querySelectorAll('img[data-drive-id]').forEach((img) => {
                const fileId = img.dataset.driveId;
                const size = img.dataset.imageSize || 'w1000';
                const sources = buildSources(fileId, size);
                let attempt = 0;

                img.addEventListener('error', function() {
                    attempt += 1;
                    if (attempt < sources.length) {
                        img.src = sources[attempt];
                        return;
                    }

                    const wrapper = img.parentElement;
                    if (!wrapper.querySelector('.image-fallback')) {
                        const fallback = document.createElement('div');
                        fallback.className = 'image-fallback';
                        fallback.textContent = '이미지를 불러오지 못했습니다.';
                        wrapper.appendChild(fallback);
                    }
                    img.style.display = 'none';
                });
            });
        });
    </script>
